{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Logo y título -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 shadow-lg mb-4">
                <i class="fas fa-capsules text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">FARMACIA AYAYAI</h2>
            <p class="text-sm text-slate-400 mt-1">Gestión de Farmacia</p>
        </div>

        <!-- Tarjeta de login -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200/60 p-8">
            <h3 class="text-lg font-semibold text-slate-700 mb-6">Iniciar Sesión</h3>

            <form method="POST">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">
                            <i class="fas fa-user text-slate-400 mr-2"></i>Usuario
                        </label>
                        <input type="text" name="username" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="Ingresa tu usuario" required autofocus>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">
                            <i class="fas fa-lock text-slate-400 mr-2"></i>Contraseña
                        </label>
                        <input type="password" name="password" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="Ingresa tu contraseña" required>
                    </div>

                    <button type="submit" class="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-2.5 rounded-xl text-sm font-medium shadow-md hover:shadow-lg transition-all duration-200">
                        <i class="fas fa-sign-in-alt"></i> Ingresar
                    </button>
                </div>
            </form>

            <!-- Separador -->
            <div class="mt-6 pt-4 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-400">
                    <i class="fas fa-shield-alt mr-1"></i> Sistema seguro · Todos los derechos reservados
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
