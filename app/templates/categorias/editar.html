{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            <i class="fas fa-pen text-amber-600"></i> Editar Categoría
        </h2>
        <p class="text-sm text-slate-400 mt-0.5">Modifica el nombre de la categoría</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6">
        <form method="POST">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nombre <span class="text-rose-500">*</span></label>
                <input type="text" name="nombre" value="{{ categoria.nombre }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
            </div>

            <div class="flex flex-wrap gap-3 mt-6 pt-4 border-t border-slate-100">
                <button type="submit" class="inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium shadow-md hover:shadow-lg transition-all duration-200">
                    <i class="fas fa-save"></i> Actualizar
                </button>
                <a href="{{ url_for('main.categorias_listar') }}" class="inline-flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
