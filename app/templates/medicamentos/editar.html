{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            <i class="fas fa-pen text-amber-600"></i> Editar Medicamento
        </h2>
        <p class="text-sm text-slate-400 mt-0.5">Modifica los datos del medicamento</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6">
        <form method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre <span class="text-rose-500">*</span></label>
                    <input type="text" name="nombre" value="{{ medicamento.nombre }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                    <textarea name="descripcion" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">{{ medicamento.descripcion }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Precio (Bs.) <span class="text-rose-500">*</span></label>
                    <input type="number" step="0.01" name="precio" value="{{ medicamento.precio }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Stock <span class="text-rose-500">*</span></label>
                    <input type="number" name="stock" value="{{ medicamento.stock }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Stock Mínimo</label>
                    <input type="number" name="stock_minimo" value="{{ medicamento.stock_minimo }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Categoría <span class="text-rose-500">*</span></label>
                    <select name="categoria_id" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
                        <option value="">Seleccione...</option>
                        {% for c in categorias %}
                        <option value="{{ c.id }}" {% if c.id == medicamento.categoria_id %}selected{% endif %}>{{ c.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Proveedor <span class="text-rose-500">*</span></label>
                    <select name="proveedor_id" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" required>
                        <option value="">Seleccione...</option>
                        {% for p in proveedores %}
                        <option value="{{ p.id }}" {% if p.id == medicamento.proveedor_id %}selected{% endif %}>{{ p.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 mt-6 pt-4 border-t border-slate-100">
                <button type="submit" class="inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium shadow-md hover:shadow-lg transition-all duration-200">
                    <i class="fas fa-save"></i> Actualizar
                </button>
                <a href="{{ url_for('main.medicamentos_listar') }}" class="inline-flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
